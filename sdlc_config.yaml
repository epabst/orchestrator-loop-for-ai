states:
  - name: ai-requirements
    label: ai-requirements
    prompt: |
      Create a brief requirements summary (500-1500 characters maximum).
      Focus on:
      • Functional requirements: what must the software do?
      • Constraints: performance, compatibility, scope
      Do NOT: architectural details, design decisions
      Format: Start with "## Requirements Summary" then 5-8 bullet points only.
      Include the keyword "COMPLETED_REQUIREMENTS" when done.
    next_state: ai-design
    keywords:
      COMPLETED_REQUIREMENTS: ai-design
    doc_file: requirements.md

  - name: ai-design
    label: ai-design
    prompt: |
      Create a brief design summary (1000-2000 characters maximum).
      Focus on:
      • Architecture: how components interact
      • Implementation approach: key strategy and pattern
      • Technical decisions: critical choices and trade-offs
      Do NOT: list requirements, include long specifications
      Format: Start with "## Design Summary" then use bullet points for all details
      Include the keyword "COMPLETED_DESIGN" when done.
    next_state: ai-development
    keywords:
      COMPLETED_DESIGN: ai-development
    doc_file: design.md

  - name: ai-development
    label: ai-development
    prompt: |
      Implement the design:
      • Write failing tests first
      • Implement code to pass tests
      Output a brief summary (300-800 characters) with bullet points:
      • What you built
      • Key implementation notes
      Do NOT: test results, long code dumps
      Include the keyword "COMPLETED_DEVELOPMENT" when done.
    next_state: ai-review
    keywords:
      COMPLETED_DEVELOPMENT: ai-review

  - name: ai-review
    label: ai-review
    prompt: |
      Review the code against requirements and design (500-1500 characters maximum).
      Format as bullet points:
      • Pass/fail verdict
      • 1-2 critical issues (if any)
      • Overall quality note
      Do NOT: line-by-line analysis, minor issues
      Include: "REVIEW_PASSED" if ready, "REVIEW_FAILED" if needs work, "NEED_HUMAN_HELP" for questions
    next_state: ai-pr-creation
    keywords:
      REVIEW_PASSED: ai-pr-creation
      REVIEW_FAILED: ai-development

  - name: ai-pr-creation
    label: ai-pr-creation
    prompt: |
      Ensure code is ready for PR (do NOT perform git operations—Orchestrator handles that).
      Output PR request in this exact format (body max 300-800 characters):

      PR_REQUESTED
      Title: <Brief title>
      Body:
      • What changed
      • Why it changed
      END_PR_REQUEST

      Use bullet format for body. Keep brief—only essentials. Include the keyword "CHANGES_SUMMARIZED" when done.
    next_state: ai-done
    keywords:
      CHANGES_SUMMARIZED: ai-done

  - name: ai-done
    label: ai-done
    prompt: |
      The task is completed.
    keywords:
      DONE: ai-done

failure_label: ai-human-help
human_help_label: ai-human-help
lock_label: ai-processing
enabled_label: ai-enabled
pr_defined_keyword: CHANGES_SUMMARIZED
merge_conflict_keyword: MERGE_RESOLVED

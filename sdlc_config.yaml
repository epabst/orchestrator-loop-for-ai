states:
  - name: ai-requirements
    label: ai-requirements
    prompt_suffix: |
      Create a brief requirements summary (500-1500 characters maximum).
      Focus only on: what must the software do? (functional requirements) and what constraints exist? (performance, compatibility, scope).
      Do NOT include architectural or design details.
      Format: Start with "## Requirements Summary" then list 5-8 bullet points. That's it.
      Include the keyword "COMPLETED_REQUIREMENTS" when done.
    next_state: ai-design
    keywords:
      success: COMPLETED_REQUIREMENTS
      failure: NEED_HUMAN_HELP
    doc_file: requirements.md

  - name: ai-design
    label: ai-design
    prompt_suffix: |
      Create a brief design summary (1000-2000 characters maximum).
      Describe: architecture (how components interact), key implementation approach, and main technical decisions.
      Do NOT list requirements again or include long specifications.
      Format: Start with "## Design Summary" then include 2-3 paragraphs describing the high-level approach and critical design choices.
      Include the keyword "COMPLETED_DESIGN" when done.
    next_state: ai-development
    keywords:
      success: COMPLETED_DESIGN
      failure: NEED_HUMAN_HELP
    doc_file: design.md

  - name: ai-development
    label: ai-development
    prompt_suffix: |
      Implement the design. Write failing tests first, then implement code to pass them.
      Output a brief summary (300-800 characters): what you built and key implementation notes.
      Do NOT output test results or long code dumps.
      Include the keyword "COMPLETED_DEVELOPMENT" when done.
    next_state: ai-review
    keywords:
      success: COMPLETED_DEVELOPMENT
      failure: NEED_HUMAN_HELP

  - name: ai-review
    label: ai-review
    prompt_suffix: |
      Review the code against requirements and design. Keep review to 500-1500 characters maximum.
      Only report: pass/fail verdict, 1-2 critical issues if any, and overall quality note.
      Do NOT do a line-by-line analysis or list minor issues.
      Include the keyword "REVIEW_PASSED" if ready, "REVIEW_FAILED" if needs more work, or "NEED_HUMAN_HELP" for questions.
    next_state: ai-pr-creation
    keywords:
      success: REVIEW_PASSED
      back: REVIEW_FAILED
      failure: NEED_HUMAN_HELP

  - name: ai-pr-creation
    label: ai-pr-creation
    prompt_suffix: |
      Ensure your code is ready for PR. Do NOT perform git operations—the Orchestrator handles that.
      Output the PR request in this exact format (PR body: 300-800 characters maximum):

      PR_REQUESTED
      Title: <Brief title>
      Body:
      <2-3 sentences describing what changed and why>
      END_PR_REQUEST

      Keep the body brief. Only include what's essential. Include the keyword "CHANGES_SUMMARIZED" when done.
    next_state: ai-done
    keywords:
      success: CHANGES_SUMMARIZED
      failure: NEED_HUMAN_HELP

  - name: ai-done
    label: ai-done
    prompt_suffix: |
      The task is completed.
    keywords:
      success: DONE

human_help_label: ai-human-help
lock_label: ai-processing
enabled_label: ai-enabled
